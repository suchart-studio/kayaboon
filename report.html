<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard รายงานสรุปภาพรวม</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">📊 ระบบ Dashboard รายงาน</h1>
                <p class="text-slate-500">สรุปข้อมูลสมาชิกและสถิติการคัดแยกขยะ</p>
            </div>
            <div class="flex gap-2">
                <a href="add-trash.html" class="px-4 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition shadow-sm text-sm">♻️ บันทึกขยะใหม่</a>
                <a href="admin.html" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg font-bold hover:bg-slate-300 transition text-sm">กลับหน้าแอดมิน</a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm font-bold text-slate-400 uppercase">สมาชิกทั้งหมด</p>
                <h2 id="dashTotalMembers" class="text-3xl font-bold text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-sm font-bold text-slate-400 uppercase">เงินกองทุนสะสม</p>
                <h2 id="dashTotalBalance" class="text-3xl font-bold text-emerald-600">฿0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-amber-500">
                <p class="text-sm font-bold text-slate-400 uppercase">ยอดขายขยะรวม</p>
                <h2 id="dashTotalTrash" class="text-3xl font-bold text-amber-600">฿0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-purple-500">
                <p class="text-sm font-bold text-slate-400 uppercase">ผ่านเกณฑ์สิทธิ์</p>
                <h2 id="dashActiveMembers" class="text-3xl font-bold text-purple-600">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span>♻️ สัดส่วนประเภทขยะ</span>
                </h3>
                <div class="h-[300px]">
                    <canvas id="trashTypeChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-slate-800">🏠 ยอดขยะสะสมรายชุมชน (Top 10)</h3>
                    <select id="zoneFilter" class="text-sm border rounded-md p-1 outline-none">
                        <option value="all">ทุกโซน</option>
                        <option value="1">โซน 1</option>
                        <option value="2">โซน 2</option>
                    </select>
                </div>
                <div class="h-[300px]">
                    <canvas id="communityBarChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-800">📄 ประวัติการบันทึกขยะล่าสุด</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-400 text-[11px] uppercase font-bold">
                        <tr>
                            <th class="p-4 border-b">วันที่</th>
                            <th class="p-4 border-b">ชุมชน</th>
                            <th class="p-4 border-b text-right">แก้ว</th>
                            <th class="p-4 border-b text-right">กระดาษ</th>
                            <th class="p-4 border-b text-right">พลาสติก</th>
                            <th class="p-4 border-b text-right font-bold text-slate-700">รวม (บาท)</th>
                        </tr>
                    </thead>
                    <tbody id="dashTrashTable" class="text-sm divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="./js/report.js"></script>
</body>
</html>
