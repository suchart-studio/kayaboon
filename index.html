<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กองทุนฌาปนกิจเปลี่ยนขยะเป็นบุญ</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f3f4f6; }
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ สำหรับ UI มือถือ */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:py-8 max-w-md mx-auto min-h-screen flex flex-col relative">

    <header class="text-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
        <h1 class="text-xl font-bold text-green-700">กองทุนฌาปนกิจเปลี่ยนขยะเป็นบุญ</h1>
        <p class="text-sm text-gray-500">เทศบาลนครขอนแก่น</p>
    </header>

    <div class="mb-4 sticky top-2 z-10">
        <input type="text" id="searchInput" placeholder="🔍 ค้นหาชื่อ หรือ รหัสสมาชิก..." class="w-full p-3 rounded-xl border border-gray-200 shadow-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
    </div>

    <button id="importDataBtn" class="w-full bg-blue-500 text-white p-3 rounded-xl mb-4 text-sm font-bold shadow-md hidden">
        📥 ดึงข้อมูลตั้งต้นจาก Google Sheet
    </button>

    <div id="memberList" class="space-y-3 pb-20">
        <div class="text-center text-gray-500 py-10 animate-pulse">กำลังโหลดข้อมูล...</div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</body>
</html>
