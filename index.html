<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กองทุนฌาปนกิจเปลี่ยนขยะเป็นบุญ</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f3f4f6; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:py-8 max-w-md mx-auto min-h-screen flex flex-col relative">

    <header class="text-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
        <h1 class="text-xl font-bold text-green-700">กองทุนฌาปนกิจเปลี่ยนขยะเป็นบุญ</h1>
        <p class="text-sm text-gray-500">เทศบาลนครขอนแก่น</p>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="col-span-2 bg-gradient-to-r from-blue-600 to-blue-500 text-white p-4 rounded-2xl shadow-md text-center">
            <p class="text-sm opacity-90 mb-1">ยอดเงินกองทุนรวม (บาท)</p>
            <h2 id="summaryTotalBalance" class="text-3xl font-bold tracking-wider">฿0.00</h2>
        </div>
        <div class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm text-center">
            <p class="text-xs text-gray-500 mb-1">สมาชิกทั้งหมด</p>
            <h2 id="summaryTotalMembers" class="text-2xl font-bold text-gray-800">0</h2>
        </div>
        <div class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm text-center">
            <p class="text-xs text-gray-500 mb-1">สถานะ: ปกติ / อื่นๆ</p>
            <h2 class="text-xl font-bold text-gray-800"><span id="summaryActive" class="text-green-600">0</span> <span class="text-gray-400 font-medium text-sm">/</span> <span id="summaryInactive" class="text-red-500">0</span></h2>
        </div>
    </div>

    <div class="mb-4 sticky top-2 z-10">
        <input type="text" id="searchInput" placeholder="🔍 ค้นหาชื่อ, รหัส หรือ ชุมชน..." class="w-full p-3 rounded-xl border border-gray-200 shadow-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
    </div>

    <div id="memberList" class="space-y-3 pb-20">
        <div class="text-center text-gray-500 py-10 animate-pulse">กำลังโหลดข้อมูล...</div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
