<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการคัดแยกขยะรายชุมชน</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 mb-8">
            <header class="flex justify-between items-center mb-6 border-b pb-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-green-700">♻️ บันทึกการคัดแยกขยะ</h1>
                    <p class="text-sm text-gray-500 mt-1">หน่วยการบันทึก: กิโลกรัม (กก.)</p>
                </div>
                <a href="report.html" class="px-4 py-2 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition text-sm">ไปหน้า Dashboard</a>
            </header>

            <form id="trashForm" class="space-y-6">
                <input type="hidden" id="editId"> <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">วันที่บันทึก</label>
                        <input type="date" id="recordDate" class="w-full p-3 rounded-lg border-2 border-gray-200 focus:border-green-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">เลือกชุมชน</label>
                        <select id="communitySelect" class="w-full p-3 rounded-lg border-2 border-gray-200 focus:border-green-500 outline-none" required>
                            <option value="">-- กรุณาเลือกชุมชน --</option>
                        </select>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">น้ำหนักขยะแต่ละประเภท (กิโลกรัม)</h3>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-blue-600 mb-1">🍷 แก้ว</label>
                            <input type="number" id="valGlass" step="0.01" class="w-full p-2 rounded-lg border bg-blue-50 focus:border-blue-500 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-emerald-600 mb-1">📦 กระดาษ</label>
                            <input type="number" id="valPaper" step="0.01" class="w-full p-2 rounded-lg border bg-emerald-50 focus:border-emerald-500 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-amber-600 mb-1">🧴 พลาสติก</label>
                            <input type="number" id="valPlastic" step="0.01" class="w-full p-2 rounded-lg border bg-amber-50 focus:border-amber-500 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-indigo-600 mb-1">🥫 โลหะ</label>
                            <input type="number" id="valMetal" step="0.01" class="w-full p-2 rounded-lg border bg-indigo-50 focus:border-indigo-500 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-purple-600 mb-1">🗑️ อื่นๆ</label>
                            <input type="number" id="valOther" step="0.01" class="w-full p-2 rounded-lg border bg-purple-50 focus:border-purple-500 outline-none" placeholder="0.00">
                        </div>
                    </div>

                    <div class="mt-6 flex items-center justify-between bg-green-50 p-4 rounded-xl">
                        <span class="font-bold text-green-800">น้ำหนักรวม: <span id="totalDisplay" class="text-2xl ml-2">0.00</span> กก.</span>
                        <div class="flex gap-2">
                            <button type="button" id="cancelEdit" class="hidden px-4 py-2 bg-gray-400 text-white rounded-lg font-bold">ยกเลิกแก้ไข</button>
                            <button type="submit" id="saveBtn" class="px-8 py-2 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition">💾 บันทึกข้อมูล</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-700">📋 รายการบันทึกล่าสุด</h3>
                <span class="text-xs text-gray-500">* แสดง 50 รายการล่าสุด</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 uppercase text-[11px] font-bold">
                            <th class="p-4">วันที่</th>
                            <th class="p-4">ชุมชน</th>
                            <th class="p-4 text-right">แก้ว</th>
                            <th class="p-4 text-right">กระดาษ</th>
                            <th class="p-4 text-right">พลาสติก</th>
                            <th class="p-4 text-right font-bold">รวม (กก.)</th>
                            <th class="p-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="trashRecordsTable" class="divide-y">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="./js/add-trash.js"></script>
</body>
</html>
