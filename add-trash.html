<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการคัดแยกขยะรายชุมชน</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100">
        <header class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-green-700">♻️ บันทึกการคัดแยกขยะ</h1>
                <p class="text-sm text-gray-500 mt-1">บันทึกยอดขยะ 5 ประเภท รายชุมชน</p>
            </div>
            <a href="admin.html" class="px-4 py-2 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition text-sm">
                กลับหน้าแอดมิน
            </a>
        </header>

        <form id="trashForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">วันที่บันทึก</label>
                    <input type="date" id="recordDate" class="w-full p-3 rounded-lg border-2 border-gray-200 focus:border-green-500 focus:outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">เลือกชุมชน</label>
                    <select id="communitySelect" class="w-full p-3 rounded-lg border-2 border-gray-200 focus:border-green-500 focus:outline-none" required>
                        <option value="">-- กรุณาเลือกชุมชน --</option>
                        </select>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">ยอดขยะแต่ละประเภท (บาท / กิโลกรัม)</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-blue-600 mb-1">🍷 แก้ว</label>
                        <input type="number" id="valGlass" min="0" step="0.01" class="w-full p-3 rounded-lg border-2 border-blue-100 focus:border-blue-500 focus:outline-none bg-blue-50" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-emerald-600 mb-1">📦 กระดาษ</label>
                        <input type="number" id="valPaper" min="0" step="0.01" class="w-full p-3 rounded-lg border-2 border-emerald-100 focus:border-emerald-500 focus:outline-none bg-emerald-50" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-amber-600 mb-1">🧴 พลาสติก</label>
                        <input type="number" id="valPlastic" min="0" step="0.01" class="w-full p-3 rounded-lg border-2 border-amber-100 focus:border-amber-500 focus:outline-none bg-amber-50" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-indigo-600 mb-1">🥫 โลหะ</label>
                        <input type="number" id="valMetal" min="0" step="0.01" class="w-full p-3 rounded-lg border-2 border-indigo-100 focus:border-indigo-500 focus:outline-none bg-indigo-50" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-purple-600 mb-1">🗑️ อื่นๆ</label>
                        <input type="number" id="valOther" min="0" step="0.01" class="w-full p-3 rounded-lg border-2 border-purple-100 focus:border-purple-500 focus:outline-none bg-purple-50" placeholder="0">
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-200 flex items-center justify-between bg-green-50 p-4 rounded-xl">
                    <span class="text-lg font-bold text-green-800">ยอดรวมทั้งหมด:</span>
                    <span id="totalDisplay" class="text-2xl font-bold text-green-600">0</span>
                </div>
            </div>

            <button type="submit" id="saveBtn" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-lg hover:bg-green-700 transition shadow-lg flex justify-center items-center">
                💾 บันทึกข้อมูล
            </button>
        </form>
    </div>

    <script type="module" src="./js/add-trash.js"></script>
</body>
</html>
