<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรับซื้อขยะ</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f0fdf4; }
    </style>
</head>
<body class="p-4 md:py-8 max-w-md mx-auto">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-t-8 border-green-500">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">♻️</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-1">เจ้าหน้าที่บันทึกขยะ</h2>
            <p class="text-sm text-gray-500 mb-6">กรุณาระบุรหัสผ่านเพื่อเข้าใช้งาน</p>
            <input type="password" id="trashPassword" class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-4 text-center text-2xl tracking-widest focus:border-green-500 outline-none transition-all bg-gray-50" placeholder="••••••••">
            <button onclick="checkTrashPassword()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-100 transition-all active:scale-95">เข้าใช้งานระบบ</button>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden">รหัสผ่านไม่ถูกต้อง!</p>
        </div>
    </div>

    <div id="trashContent" class="hidden">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-green-100">
            <h1 class="text-xl font-bold text-green-700 flex items-center">🚛 บันทึกยอดขยะ</h1>
            <button onclick="logoutTrash()" class="text-xs text-gray-400 font-bold hover:text-red-500 transition">ออกจากระบบ</button>
        </header>

        <section class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4">
            <div class="relative">
                <input type="text" id="memberSearch" class="w-full p-4 pl-12 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-2xl outline-none transition-all font-bold text-lg" placeholder="ชื่อ หรือ รหัสสมาชิก...">
                <span class="absolute left-4 top-4 text-2xl">🔍</span>
            </div>
            <div id="searchResult" class="mt-4 hidden"></div>
        </section>

        <section id="trashFormSection" class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 hidden">
            <form id="trashEntryForm" class="space-y-4">
                <input type="hidden" id="selectedMemberId">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">รายการขยะ</label>
                    <input type="text" id="trashType" class="w-full p-3 bg-gray-50 border rounded-xl outline-none" placeholder="เช่น ขวดพลาสติก" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">น้ำหนัก (กก.)</label>
                        <input type="number" id="weight" step="0.01" class="w-full p-3 bg-gray-50 border rounded-xl outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">ราคารวม (บาท)</label>
                        <input type="number" id="price" step="0.01" class="w-full p-3 bg-green-50 border-2 border-green-200 rounded-xl focus:border-green-500 outline-none font-bold text-green-700 text-lg" required>
                    </div>
                </div>
                <button type="submit" id="btnSubmitTrash" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center">
                    <span id="btnText">ยืนยันบันทึกยอดเงิน</span>
                </button>
            </form>
        </section>
    </div>

    <script type="module" src="js/add-trash.js"></script>
</body>
</html>
