<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการหลังบ้าน (Admin)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 bg-opacity-95 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold text-gray-800 mb-1">เข้าสู่ระบบผู้ดูแล</h2>
            <p class="text-sm text-gray-500 mb-6">กรุณากรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
            <input type="password" id="adminPassword" class="w-full p-3 border-2 border-gray-100 rounded-xl mb-4 text-center text-xl tracking-widest focus:border-blue-500 outline-none" placeholder="••••••••">
            <button onclick="checkPassword()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">ตกลง</button>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden">รหัสผ่านไม่ถูกต้อง!</p>
        </div>
    </div>

    <div id="adminContent" class="hidden min-h-screen pb-20">
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center space-x-2">
                        <div class="bg-blue-600 p-2 rounded-lg text-white">⚙️</div>
                        <span class="text-xl font-bold text-slate-800">Admin Dashboard</span>
                    </div>
                    <div class="flex space-x-2">
                        <a href="report.html" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-200">ดูรายงาน</a>
                        <button onclick="logout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-100 transition">ออกจากระบบ</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800">จัดการรายชื่อสมาชิก</h1>
                        <p class="text-slate-500 text-sm mt-1">เพิ่ม แก้ไข หรือลบข้อมูลสมาชิกกองทุน</p>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="openModal()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition flex items-center shadow-lg shadow-blue-100">
                            <span class="mr-2">+</span> เพิ่มสมาชิกใหม่
                        </button>
                        <button onclick="exportToExcel()" class="bg-green-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-green-700 transition flex items-center shadow-lg shadow-green-100">
                            📊 ส่งออก Excel
                        </button>
                    </div>
                </div>

                <div class="mb-6 relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">🔍</span>
                    <input type="text" id="adminSearchInput" placeholder="ค้นหาตามชื่อ, รหัส หรือ ชุมชน..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition text-sm">
                </div>

                <div class="overflow-x-auto rounded-xl border border-slate-100 shadow-sm">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-slate-800 text-white text-xs uppercase tracking-wider font-bold">
                            <tr>
                                <th class="p-4">รหัส</th>
                                <th class="p-4">ชื่อ-นามสกุล</th>
                                <th class="p-4">ชุมชน (เขต)</th>
                                <th class="p-4 text-right">เงินฝาก</th>
                                <th class="p-4 text-right">ขยะ</th>
                                <th class="p-4 text-right text-blue-300">คงเหลือ</th>
                                <th class="p-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="adminMemberTable" class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="memberModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl my-auto">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-slate-50 rounded-t-3xl">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">ข้อมูลสมาชิก</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">×</button>
            </div>
            
            <form id="memberForm" class="p-6">
                <input type="hidden" id="editId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">รหัสสมาชิก</label>
                        <input type="text" id="memberId" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อ-นามสกุล</label>
                        <input type="text" id="name" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">เขต</label>
                        <select id="zone" required onchange="updateCommunityOptions()" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-white">
                            <option value="">เลือกเขต</option>
                            <option value="0">เขต 0</option>
                            <option value="1">เขต 1</option>
                            <option value="2">เขต 2</option>
                            <option value="3">เขต 3</option>
                            <option value="4">เขต 4</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">ชุมชน</label>
                        <select id="community" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-white">
                            <option value="">กรุณาเลือกเขตก่อน</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">เงินฝากสมทบ (บาท)</label>
                        <input type="number" id="deposit" step="0.01" value="0" oninput="calculateBalance()" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">รายได้จากการขายขยะ (บาท)</label>
                        <input type="number" id="trashIncome" step="0.01" value="0" oninput="calculateBalance()" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1 text-red-500">ยอดหักสงเคราะห์ (บาท)</label>
                        <input type="number" id="deduction" step="0.01" value="0" oninput="calculateBalance()" class="w-full p-3 border border-red-100 rounded-xl bg-red-50 focus:ring-2 focus:ring-red-500 outline-none transition">
                    </div>

                    <div class="col-span-1 md:col-span-2 mt-4 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-blue-800 mb-2 underline">รายชื่อผู้รับสิทธิ์ (3 ท่าน)</label>
                                <div class="space-y-2">
                                    <div class="flex space-x-1">
                                        <input type="text" id="ben1Name" placeholder="คนแรก" class="flex-1 p-2 border rounded-lg text-sm outline-none focus:border-blue-500">
                                        <select id="ben1Status" class="w-24 p-2 border rounded-lg text-[10px] bg-white font-bold">
                                            <option value="ยังไม่รับ">🔴 ยังไม่รับ</option>
                                            <option value="รับแล้ว">🟢 รับแล้ว</option>
                                        </select>
                                    </div>
                                    <div class="flex space-x-1">
                                        <input type="text" id="ben2Name" placeholder="คนที่สอง" class="flex-1 p-2 border rounded-lg text-sm outline-none focus:border-blue-500">
                                        <select id="ben2Status" class="w-24 p-2 border rounded-lg text-[10px] bg-white font-bold">
                                            <option value="ยังไม่รับ">🔴 ยังไม่รับ</option>
                                            <option value="รับแล้ว">🟢 รับแล้ว</option>
                                        </select>
                                    </div>
                                    <div class="flex space-x-1">
                                        <input type="text" id="ben3Name" placeholder="คนที่สาม" class="flex-1 p-2 border rounded-lg text-sm outline-none focus:border-blue-500">
                                        <select id="ben3Status" class="w-24 p-2 border rounded-lg text-[10px] bg-white font-bold">
                                            <option value="ยังไม่รับ">🔴 ยังไม่รับ</option>
                                            <option value="รับแล้ว">🟢 รับแล้ว</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-blue-800 mb-2 underline">ลำดับผู้รับเงิน (1-2-3)</label>
                                <div class="space-y-2">
                                    <input type="text" id="rec1Name" placeholder="ลำดับที่ 1" class="w-full p-2 border rounded-lg text-sm outline-none focus:border-blue-500">
                                    <input type="text" id="rec2Name" placeholder="ลำดับที่ 2" class="w-full p-2 border rounded-lg text-sm outline-none focus:border-blue-500">
                                    <input type="text" id="rec3Name" placeholder="ลำดับที่ 3" class="w-full p-2 border rounded-lg text-sm outline-none focus:border-blue-500">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-2 mt-2 pt-4 border-t border-gray-200 flex items-center justify-between">
                        <label class="block text-lg font-bold text-gray-800">ยอดเงินคงเหลือรวม :</label>
                        <input type="number" id="memberBalance" class="w-1/3 p-3 text-right border-2 border-blue-500 rounded-lg bg-blue-50 text-blue-700 font-bold text-2xl" readonly>
                    </div>

                    <div class="md:col-span-2 p-3 rounded-lg border bg-gray-100 flex items-center justify-between">
                        <label class="block text-xs font-bold text-gray-800 uppercase">สถานะสมาชิกอัตโนมัติ :</label>
                        <input type="text" id="memberStatus" class="w-1/3 p-2 text-center border-0 bg-transparent font-bold" readonly>
                    </div>
                </div>

                <div class="flex space-x-3 mt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-300 transition">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
