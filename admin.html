<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการหลังบ้าน (Admin)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <header class="flex justify-between items-center mb-8 border-b pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">ระบบจัดการสมาชิก</h1>
                <p class="text-sm text-gray-500 mt-1">กองทุนฌาปนกิจเปลี่ยนขยะเป็นบุญ เทศบาลนครขอนแก่น</p>
            </div>
            <div class="space-x-3">
                <a href="index.html" target="_blank" class="bg-gray-100 text-gray-700 px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-gray-200 transition">ดูหน้าผู้ใช้</a>
                <button onclick="openModal('add')" class="bg-green-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-green-700 transition shadow-md">+ เพิ่มสมาชิกใหม่</button>
            </div>
        </header>

        <div class="mb-6">
            <input type="text" id="adminSearchInput" placeholder="ค้นหาชื่อ หรือ รหัสสมาชิก..." class="w-1/3 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-gray-50">
        </div>

        <div class="overflow-x-auto rounded-xl border border-gray-200">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-4 font-semibold w-1/6">รหัสสมาชิก</th>
                        <th class="p-4 font-semibold w-2/6">ชื่อ-นามสกุล</th>
                        <th class="p-4 font-semibold text-center w-1/6">สถานะ</th>
                        <th class="p-4 font-semibold text-right w-1/6">ยอดเงิน (บาท)</th>
                        <th class="p-4 font-semibold text-center w-1/6">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="adminMemberTable" class="divide-y divide-gray-200 text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="memberModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl p-8 shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold mb-6 border-b pb-3 text-gray-800">จัดการข้อมูลสมาชิก</h2>
            <form id="memberForm">
                <input type="hidden" id="formMode"> <input type="hidden" id="docId">
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">รหัสสมาชิก</label>
                        <input type="text" id="memberId" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อ-นามสกุล</label>
                        <input type="text" id="memberName" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white" required>
                    </div>
                    <div class="flex space-x-4">
                        <div class="flex-1">
                            <label class="block text-sm font-bold text-gray-700 mb-1">สถานะ</label>
                            <select id="memberStatus" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50">
                                <option value="ปกติ">ปกติ</option>
                                <option value="พ้นสภาพ">พ้นสภาพ</option>
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-bold text-gray-700 mb-1">ยอดเงินคงเหลือ</label>
                            <input type="number" id="memberBalance" step="0.01" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white" required>
                        </div>
                    </div>
                </div>
                <div class="flex space-x-3 mt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-300 transition">ยกเลิก</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
